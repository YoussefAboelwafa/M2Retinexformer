# general settings
name: LOL_v2_real
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv2/Real_captured/Train/Normal
    dataroot_lq: data/LOLv2/Real_captured/Train/Low
    geometric_augs: true

    filename_tmpl: "{}"
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 2

    ### ------- Training on single fixed-patch size 256x256---------
    mini_batch_sizes: [2]
    iters: [300000]
    gt_size: 256
    gt_sizes: [256]
    ### ------------------------------------------------------------

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: data/LOLv2/Real_captured/Test/Normal
    dataroot_lq: data/LOLv2/Real_captured/Test/Low
    io_backend:
      type: disk

# network structures
network_g:
  type: MultiModalRetinexFormer
  in_channels: 3
  out_channels: 3
  n_feat: 40
  stage: 3
  num_blocks: [1, 2, 2]

  fusion_type: gate

  modalities:
    depth:
      enabled: true
      encoder: vitb
      checkpoint: Depth-Anything-V2/checkpoints/depth_anything_v2_vitb.pth
      freeze: true

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 150000
  warmup_iter: -1 # no warm up
  use_grad_clip: true

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [46000, 104000]
    restart_weights: [1, 1]
    eta_mins: [0.0003, 0.000001]

  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: Adam
    lr: !!float 2e-4
    betas: [0.9, 0.999]

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      relu3_1: 1.0
      relu4_1: 1.0
      relu5_1: 1.0
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: 0.5
    style_weight: 0
    criterion: l1

# validation settings
val:
  window_size: 4
  val_freq: !!float 1e3
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 500
  save_checkpoint_freq: !!float 1e3
  use_tb_logger: true
  wandb:
    project: low_light_depth
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
